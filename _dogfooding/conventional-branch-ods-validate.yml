# This workflow validates delivery artifacts against Open Delivery Spec.
# Submitted via PR from https://github.com/open-delivery-spec

name: ODS Validate

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Conventional branch & commit checks
        uses: commit-check/commit-check-action@v2
        with:
          message: true
          branch: true

      - name: ODS AI code quality gate
        uses: open-delivery-spec/validate-action@v1
        with:
          diff-base: ${{ github.event.pull_request.base.sha || 'origin/main' }}
          branch: ${{ github.head_ref }}
          summary: 'true'
          comment: 'true'
