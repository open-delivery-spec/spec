# ODS Policy - Open Source Profile
# Relaxed rules suitable for open-source projects
profile: oss

policy:
  branch:
    allowed_types:
      - feature
      - feat
      - bugfix
      - fix
      - hotfix
      - release
      - chore
    require_ticket: false
    max_description_length: 100

  pr:
    required_sections:
      - "## Summary"
      - "## Type"
      - "## Changes"
      - "## Testing"
      - "## Checklist"
    min_changes: 1

  commit:
    allowed_types:
      - feat
      - fix
      - docs
      - style
      - refactor
      - perf
      - test
      - build
      - ci
      - chore
      - revert
    require_scope: false
    max_subject_length: 100

  ai_disclosure:
    required: false
    strict_tool_name: false
    require_human_review: false
    ai_branch_naming: warning
