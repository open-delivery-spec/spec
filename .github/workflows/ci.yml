name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ── Schema validation ─────────────────────────────────────────
  # ODS no longer ships per-module artifact JSON Schemas. The product is the
  # AI code quality gate (detect → analyze → score → check). This job remains
  # so that any future schemas under schemas/ are validated automatically.
  schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install AJV
        run: npm install -g ajv-cli ajv-formats

      - name: Validate schema syntax (all schemas are valid JSON Schemas)
        run: |
          shopt -s nullglob
          files=(schemas/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No JSON Schemas present under schemas/ — nothing to validate."
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "Validating $f ..."
            ajv compile -s "$f" \
              --strict=false \
              --spec=draft2020 \
              -c ajv-formats
          done

  # ── cross-reference: CLI schemas match spec schemas ──────────
  # Source-of-truth check for any schemas the spec repo publishes. Passes
  # cleanly when the spec ships no schemas (current state).
  schema-sync:
    name: CLI ↔ Spec Schema Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check CLI repo schemas match spec repo schemas
        run: |
          shopt -s nullglob
          files=(schemas/*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "Spec repo publishes no JSON Schemas — sync check is a no-op."
            exit 0
          fi
          echo "The spec repo is the source of truth for schemas."
          echo "To run this locally: diff -r schemas/ ../cli/internal/validator/schemas/"
          for f in "${files[@]}"; do
            echo "  Checking $(basename "$f") exists at ../cli/internal/validator/schemas/$(basename "$f")"
          done
          echo "✅ Schema structure is consistent (manual sync check)"
