# ODS Validate — Dogfooding workflow for the spec repository
#
# Runs the ODS AI code quality gate on every PR to main.
# Conventional branch-name and commit-message checks run via commit-check;
# the ODS gate itself runs via validate-action.

name: ODS Validate

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Conventional branch & commit checks
        run: |
          python3 -m pip install 'commit-check>=2.9.0'
          commit-check --message --branch

      - name: ODS AI code quality gate
        uses: open-delivery-spec/validate-action@v1
        with:
          diff-base: ${{ github.event.pull_request.base.sha || 'origin/main' }}
          branch: ${{ github.head_ref }}
          summary: 'true'
          comment: 'true'
